name: Create Release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          composer install --no-interaction --no-dev
          mkdir -p echo/vendor/bootstrap
          cp vendor/twbs/bootstrap/dist/css/bootstrap.min.css echo/vendor/bootstrap/
          cp vendor/twbs/bootstrap/dist/css/bootstrap.min.css.map echo/vendor/bootstrap/
          cp vendor/twbs/bootstrap/dist/js/bootstrap.bundle.min.js echo/vendor/bootstrap/
          cp vendor/twbs/bootstrap/dist/js/bootstrap.bundle.min.js.map echo/vendor/bootstrap/

      - name: Package theme
        run: zip -r echo-${GITHUB_REF_NAME}.zip echo/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: echo-${{ github.ref_name }}.zip
