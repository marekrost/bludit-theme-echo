name: Create Release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package theme
        run: zip -r echo-${GITHUB_REF_NAME}.zip echo/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: echo-${{ github.ref_name }}.zip
